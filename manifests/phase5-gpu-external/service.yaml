# In-cluster Service for the GPU model server. It selects the proxy pods below,
# which forward to the host's Docker vLLM-ROCm on the MI250. Argo CD manages the
# Service + Deployment + ConfigMap (unlike a manual Endpoints, which Argo CD
# excludes by default — see the Phase 5 follow-up write-up).
apiVersion: v1
kind: Service
metadata:
  name: gpu-vllm
  namespace: serving
spec:
  selector:
    app: gpu-vllm-proxy
  ports:
    - name: http
      port: 8000
      targetPort: 8000

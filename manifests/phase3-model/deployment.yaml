apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-server
  namespace: serving
  labels:
    app: model-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
    spec:
      volumes:
        - name: models
          emptyDir: {}
      # weights are pulled by an initContainer (mirrors a real model server's
      # PVC/initContainer weight-load) — robust vs llama.cpp's -hf resolver
      initContainers:
        - name: fetch-model
          image: curlimages/curl:8.10.1
          args:
            - "-fL"
            - "-o"
            - "/models/model.gguf"
            - "https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q5_0.gguf"
          volumeMounts:
            - { name: models, mountPath: /models }
      containers:
        - name: llama
          image: ghcr.io/ggml-org/llama.cpp:server
          args:
            - "-m"
            - "/models/model.gguf"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "-c"
            - "4096"
            - "--alias"
            - "qwen2.5-0.5b-q5_0"
          ports:
            - containerPort: 8000
          volumeMounts:
            - { name: models, mountPath: /models }
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 4
            failureThreshold: 60
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
